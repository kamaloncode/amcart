name: Microservices CI/CD

on:
  push:
    branches: [ "main" ]

jobs:

  # FRONTEND
  frontend:
    if: contains(join(github.event.commits.*.modified, ','), 'frontend')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install UI dependencies
      run: |
        cd frontend
        npm install

    - name: Build UI
      run: |
        cd frontend
        npm run build

    - name: Deploy UI
      run: curl -X POST https://api.render.com/deploy/srv-d74lqhffte5s73f3c1b0?key=nmDpP8ykomw


  # PRODUCT API
  product:
    if: contains(join(github.event.commits.*.modified, ','), 'backend/AmCart.Services.ProductAPI')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore backend/AmCart.Services.ProductAPI/AmCart.Services.ProductAPI.csproj
    - run: dotnet build backend/AmCart.Services.ProductAPI/AmCart.Services.ProductAPI.csproj --no-restore

    - name: Deploy Product API
      run: curl -X POST https://api.render.com/deploy/srv-d71narfkijhs73cpfd20?key=PXFb67uMGKQ


  # AUTH API
  auth:
    if: contains(join(github.event.commits.*.modified, ','), 'backend/AuthService')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore backend/AuthService/AuthService.csproj
    - run: dotnet build backend/AuthService/AuthService.csproj --no-restore

    - name: Deploy Auth API
      run: curl -X POST https://api.render.com/deploy/srv-d70isna4d50c73euld4g?key=GE13zUBjujQ


  # GATEWAY API
  gateway:
    if: contains(join(github.event.commits.*.modified, ','), 'backend/ApiGateway')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore backend/ApiGateway/ApiGateway.csproj
    - run: dotnet build backend/ApiGateway/ApiGateway.csproj --no-restore

    - name: Deploy Gateway API
      run: curl -X POST https://api.render.com/deploy/srv-d731ovoule4c73er3ns0?key=Ltc36xKqJnY


  # CART API
  cart:
    if: contains(join(github.event.commits.*.modified, ','), 'backend/AmCart.Services.CartAPI')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore backend/AmCart.Services.CartAPI/AmCart.Services.CartAPI.csproj
    - run: dotnet build backend/AmCart.Services.CartAPI/AmCart.Services.CartAPI.csproj --no-restore

    - name: Deploy Cart API
      run: curl -X POST https://api.render.com/deploy/srv-d71pvevdiees73bulfig?key=RZi6Mcj3wlI


  # ORDER API
  order:
    if: contains(join(github.event.commits.*.modified, ','), 'backend/AmCart.Services.OrderAPI')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore backend/AmCart.Services.OrderAPI/AmCart.Services.OrderAPI.csproj
    - run: dotnet build backend/AmCart.Services.OrderAPI/AmCart.Services.OrderAPI.csproj --no-restore

    - name: Deploy Order API
      run: curl -X POST https://api.render.com/deploy/srv-d71r6fua2pns73fd17v0?key=SPzjTGO2Erw